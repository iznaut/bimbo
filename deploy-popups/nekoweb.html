<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="bulma.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <section class="section">
            <div class="container">
                <h1 class="title">
                    one-click deployment with <a href="https://nekoweb.org" target="_blank">Nekoweb</a>
                </h1>
                <div class="block">
                    please visit <a href="https://nekoweb.org/api">API - nekoweb.org</a> to generate an API key and paste it here:
                </div>
                <div class="block">
                    <form action="#" id="authForm" onsubmit="sendForm(event)">
                        <div class="field">
                            <div class="control">
                                <input class="input" placeholder="Nekoweb API key" type="text" name="key" id="key">
                            </div>
                        </div>
                        <div class="field">
                            <div class="control">
                                <input class="input" placeholder="domain" type="text" name="domain" id="domain">
                                <p class="help">e.g. mycoolsite.nekoweb.org</p>
                            </div>
                        </div>
                        <div class="field is-grouped">
                            <div class="control">
                                <button class="button is-link">Submit</button>
                            </div>
                            <div class="control">
                                <button class="button is-link is-light">Cancel</button>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </section>
    </body>
    <script>
        function sendForm(event) {
            event.preventDefault() // stop the form from submitting
            let key = document.getElementById("key").value
            let domain = document.getElementById("domain").value
            if (key) {
                window.electron.formSubmission({
                    provider: 'nekoweb',
                    apiKey: key,
                    domain: domain
                })
            }
            window.close()
        }

        document.body.addEventListener('click', event => {
            if (event.target.tagName.toLowerCase() === 'a' && event.target.protocol != 'file:') {
                event.preventDefault()
                window.electron.openExternalUrl(event.target.href)
            }
        })
    </script>
</html>
